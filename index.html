<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حساب امیرعلی</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <header>
            <h1>حساب امیرعلی</h1>
            <p>مدیریت خریدهای نسیه</p>
        </header>

        <div class="top-box">
            <button id="addBtn">➕ افزودن خرید</button>

            <div class="total-box">
                جمع کل:
                <span id="totalPrice">0</span>
                تومان
            </div>
        </div>

        <div class="table-box">
            <table>
                <thead>
                    <tr>
                        <th>محصول</th>
                        <th>تعداد</th>
                        <th>قیمت</th>
                        <th>جمع</th>
                        <th>تاریخ</th>
                        <th>ساعت</th>
                        <th>عملیات</th>
                    </tr>
                </thead>

                <tbody id="productList">
                </tbody>
            </table>
        </div>

    </div>

    <!-- پنجره افزودن -->
    <div class="modal" id="modal">

        <div class="modal-content">

            <h2>افزودن خرید</h2>

            <input type="text" id="name" placeholder="نام محصول">

            <input type="number" id="count" placeholder="تعداد">

            <input type="number" id="price" placeholder="قیمت هر عدد">

            <input type="date" id="date">

            <input type="time" id="time">

            <button id="saveBtn">ثبت</button>

            <button id="closeBtn">بستن</button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
  </html>
